            type: object
          description: Component inference outputs.
          readOnly: true
        creditAmount:
          type: number
          description: Credits used of internal accounting metric.
          format: float
          readOnly: true
        blobDataExpirationTime:
          type: string
          description: Expiration time for the blob data associated with the component run.
          format: date-time
          readOnly: true
      description: "ComponentRun represents the execution details of a single component within a\npipeline run."
    ComponentTask:
      type: object
