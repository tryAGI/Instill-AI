          description: The long-running operation.
          readOnly: true
      description: GetOperationResponse contains the long-running operation details.
    v1beta.User:
      type: object
      properties:
        name:
          title: "Field 1: Canonical resource name.\nFormat: `users/{user}`.\nExample: \"users/john-doe\""
          type: string
          readOnly: true
        id:
          title: "Field 2: Resource ID (used in `name` as the last segment). This conforms to\nRFC-1034, which restricts to letters, numbers, and hyphen, with the first\ncharacter a letter, the last a letter or a number, and a 63 character\nmaximum.\nAuto-generated by backend: \"usr-\" prefix + immutable hash (80 bits entropy,\nbase62). Example: \"usr-8f3A2k9E7c1xYz\""
          type: string
          readOnly: true
        displayName:
          type: string
          description: "Field 3: Human-readable display name for UI.\nThis is copied from profile.display_name for convenience."
          readOnly: true
        slug:
          type: string
          description: "Field 4: URL-friendly slug (NO prefix).\nDerived from display_name, used for human-friendly URLs."
          readOnly: true
        aliases:
          type: array
          items:
            type: string
          description: 'Field 5: Previous slugs for backward compatibility.'
          readOnly: true
        description:
          type: string
          description: 'Field 6: Optional description / bio.'
          readOnly: true
        createTime:
          type: string
          description: 'Field 7: Creation time.'
          format: date-time
          readOnly: true
        updateTime:
          type: string
          description: 'Field 8: Update time.'
          format: date-time
          readOnly: true
        profile:
          allOf:
            - $ref: '#/components/schemas/UserProfile'
          description: Profile containing additional user information.
        email:
          type: string
          description: Email.
          readOnly: true
      description: "User describes an individual that interacts with Instill AI. It doesn't\ncontain any private information about the user.\n\nAIP Standard Field Ordering:\n- name (field 1): Canonical resource name\n- id (field 2): Immutable canonical resource ID\n- display_name (field 3): Human-readable display name\n- slug (field 4): URL-friendly slug\n- aliases (field 5): Previous slugs for backward compatibility\n- description (field 6): Optional description\n- create_time (field 7): Creation timestamp\n- update_time (field 8): Update timestamp"
