        name:
          title: "The resource name of the component run.\nFormat:\nnamespaces/{namespace}/pipelines/{pipeline}/runs/{run}/components/{component}"
          type: string
          readOnly: true
        id:
          type: string
          description: Unique identifier for the component within the pipeline.
          readOnly: true
        createTime:
          type: string
