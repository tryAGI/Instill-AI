          type: object
          description: "Field 13: Connection details. This field is required on creation, optional\non view. When viewing the connection details, the setup values will be\nredacted."
        view:
          title: "Field 14: View defines how the connection is presented. The following\nfields are only shown in the FULL view:\n- setup\n- scopes\n- oAuthAccessDetails"
