      enum:
        - VIEW_BASIC
        - VIEW_FULL
      type: string
      description: "View defines how a model definition is presented.\n\n - VIEW_BASIC: Default view, only includes basic information (omits `model_spec`).\n - VIEW_FULL: Full representation."
