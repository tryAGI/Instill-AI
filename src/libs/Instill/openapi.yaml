          readOnly: true
        totalDuration:
          type: integer
          description: Time taken to execute the component in milliseconds.
          format: int32
          readOnly: true
        startTime:
          type: string
          description: Time when the component started execution.
          format: date-time
          readOnly: true
        completeTime:
          type: string
