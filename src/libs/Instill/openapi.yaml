    File:
      title: "File represents a file in a knowledge base.\nField ordering follows AIP standard: name(1), id(2), display_name(3),\nslug(4), aliases(5), description(6)"
      required:
        - displayName
      type: object
      properties:
        name:
          type: string
          description: "Field 1: Canonical resource name.\nFormat:\n`namespaces/{namespace}/knowledge-bases/{knowledge_base}/files/{file}`."
          readOnly: true
        id:
          title: "Field 2: Immutable canonical resource ID (80-96 bits entropy, base62).\nExample: \"file-8f3a2k9E7c1\""
          type: string
          readOnly: true
        displayName:
          type: string
          description: "Field 3: Human-readable display name (filename) for UI.\nThis is typically the original filename of the uploaded file."
        slug:
          title: "Field 4: URL-friendly slug (NO prefix).\nIf omitted, server generates from display_name.\nIf provided, server validates and persists it.\nSlug is NOT part of resource identity.\nExample: \"my-research-file-pdf\""
          type: string
        aliases:
          type: array
          items:
            type: string
          description: "Field 5: Previous slugs for backward compatibility.\nWhen display_name changes, a new slug is generated and old slugs are stored\nhere."
          readOnly: true
        description:
          type: string
          description: 'Field 6: Optional description.'
        createTime:
          type: string
          description: 'Field 7: Creation time.'
          format: date-time
          readOnly: true
        updateTime:
          type: string
          description: 'Field 8: Last update time.'
          format: date-time
          readOnly: true
        type:
          allOf:
            - $ref: '#/components/schemas/File.Type'
          description: File type.
        processStatus:
          allOf:
            - $ref: '#/components/schemas/FileProcessStatus'
          description: File process status.
          readOnly: true
        processOutcome:
          type: string
          description: File process outcome message.
          readOnly: true
        size:
          type: string
          description: File size in bytes.
          format: int64
          readOnly: true
        totalChunks:
          type: integer
          description: Total number of chunks created from this file.
          format: int32
          readOnly: true
        totalTokens:
          type: integer
          description: Total number of tokens in this file.
          format: int32
          readOnly: true
        tags:
          type: array
          items:
            type: string
          description: Array of tags associated with the file.
        externalMetadata:
          type: object
          description: Custom metadata provided by the user during file upload.
        knowledgeBases:
          type: array
          items:
            type: string
          description: "Knowledge base resource names that this file is associated with.\nFormat: `namespaces/{namespace}/knowledge-bases/{knowledge_base}`\nA file can belong to multiple knowledge bases within the same namespace.\nThis field is populated from the file_knowledge_base junction table.\nFollows AIP-122 for resource name references."
          readOnly: true
        ownerName:
          title: "Resource name of the owner namespace.\nExample: \"namespaces/usr-7k2m9p4w1n3\" or \"namespaces/org-3t8f5q2x6b1\""
          type: string
          readOnly: true
        owner:
          allOf:
            - $ref: '#/components/schemas/Owner'
          description: File owner (User or Organization).
          readOnly: true
        creatorName:
          title: "Full resource name of the user who created this file.\nFormat: `users/{user}`"
          type: string
          readOnly: true
        creator:
          allOf:
            - $ref: '#/components/schemas/v1beta.User'
          description: "The user who created this file.\nPopulated when creator_name is present."
          readOnly: true
        content:
          type: string
          description: "Base64-encoded file content for inline upload.\nAlternative to object field for smaller files."
        downloadUrl:
          type: string
          description: Pre-signed download URL for the file.
          readOnly: true
        convertingPipeline:
          type: string
          description: "Pipeline used for converting the file to Markdown if the file is a\ndocument (i.e., a file with pdf, doc[x] or ppt[x] extension)."
        length:
          allOf:
            - $ref: '#/components/schemas/Position'
          description: Length of the file in the specified unit type.
          readOnly: true
        collections:
          type: array
          items:
            type: string
          description: "Collection resource names that this file belongs to.\nFormat: `namespaces/{namespace}/collections/{collection}`\nThis field is system-managed and populated from collection membership.\nFollows AIP-122 for resource name references."
          readOnly: true
        deleteTime:
          type: string
          description: Soft delete timestamp.
          format: date-time
          readOnly: true
        object:
          type: string
          description: "Object resource name reference for blob storage upload.\nFormat: `namespaces/{namespace}/objects/{object}`\nTwo upload approaches are supported:\n1. Direct upload: Upload file directly to MinIO via GetObjectUploadURL,\n   then provide the object resource name here.\n   This avoids base64 encoding overhead and is preferred for large files.\n2. Inline content: Provide base64-encoded file content in the 'content'\n   field. When object is provided, the 'content' field is ignored.\nFollows AIP-122 for resource name references."
    File.Type:
      title: Supported file types
      enum:
        - TYPE_TEXT
        - TYPE_MARKDOWN
        - TYPE_HTML
        - TYPE_CSV
        - TYPE_JSON
        - TYPE_PDF
        - TYPE_DOC
        - TYPE_DOCX
        - TYPE_PPT
        - TYPE_PPTX
        - TYPE_XLS
        - TYPE_XLSX
        - TYPE_PNG
        - TYPE_JPEG
        - TYPE_GIF
        - TYPE_WEBP
        - TYPE_TIFF
        - TYPE_BMP
        - TYPE_HEIC
        - TYPE_HEIF
        - TYPE_AVIF
        - TYPE_SVG
        - TYPE_MP3
        - TYPE_WAV
        - TYPE_AAC
        - TYPE_OGG
        - TYPE_FLAC
        - TYPE_M4A
        - TYPE_WMA
        - TYPE_AIFF
        - TYPE_WEBM_AUDIO
        - TYPE_MP4
        - TYPE_AVI
        - TYPE_MOV
        - TYPE_MKV
        - TYPE_FLV
        - TYPE_WMV
        - TYPE_MPEG
        - TYPE_WEBM_VIDEO
      type: string
      description: "- TYPE_TEXT: Text-based document types\ntext\n - TYPE_MARKDOWN: MARKDOWN\n - TYPE_HTML: HTML\n - TYPE_CSV: CSV\n - TYPE_JSON: JSON\n - TYPE_PDF: Container-based document types\nPDF\n - TYPE_DOC: DOC\n - TYPE_DOCX: DOCX\n - TYPE_PPT: PPT\n - TYPE_PPTX: PPTX\n - TYPE_XLS: XLS\n - TYPE_XLSX: XLSX\n - TYPE_PNG: Image types\nPNG\n - TYPE_JPEG: JPEG\n - TYPE_GIF: GIF\n - TYPE_WEBP: WEBP\n - TYPE_TIFF: TIFF\n - TYPE_BMP: BMP\n - TYPE_HEIC: HEIC\n - TYPE_HEIF: HEIF\n - TYPE_AVIF: AVIF\n - TYPE_SVG: SVG\n - TYPE_MP3: Audio types\nMP3\n - TYPE_WAV: WAV\n - TYPE_AAC: AAC\n - TYPE_OGG: OGG\n - TYPE_FLAC: FLAC\n - TYPE_M4A: M4A\n - TYPE_WMA: WMA\n - TYPE_AIFF: AIFF\n - TYPE_WEBM_AUDIO: WEBM (audio)\n - TYPE_MP4: Video types\nMP4\n - TYPE_AVI: AVI\n - TYPE_MOV: MOV\n - TYPE_MKV: MKV\n - TYPE_FLV: FLV\n - TYPE_WMV: WMV\n - TYPE_MPEG: MPEG\n - TYPE_WEBM_VIDEO: WEBM (video)"
    File.View:
      enum:
        - VIEW_BASIC
        - VIEW_FULL
        - VIEW_SUMMARY
        - VIEW_CONTENT
        - VIEW_STANDARD_FILE_TYPE
        - VIEW_ORIGINAL_FILE_TYPE
        - VIEW_CACHE
      type: string
      description: "View defines how a file is presented.\n\n - VIEW_BASIC: Default view, only includes basic metadata.\n - VIEW_FULL: Full representation with all metadata.\n - VIEW_SUMMARY: Returns MinIO pre-signed URL to converted summary content.\n - VIEW_CONTENT: Returns MinIO pre-signed URL to converted markdown content.\n - VIEW_STANDARD_FILE_TYPE: Returns MinIO pre-signed URL to standardized file:\n- Documents → PDF\n- Images → PNG\n- Audio → OGG\n- Video → MP4\n - VIEW_ORIGINAL_FILE_TYPE: Returns MinIO pre-signed URL to the original uploaded file.\n - VIEW_CACHE: Returns Gemini cache resource name."
    FileMediaType:
      enum:
        - FILE_MEDIA_TYPE_DOCUMENT
        - FILE_MEDIA_TYPE_IMAGE
        - FILE_MEDIA_TYPE_AUDIO
        - FILE_MEDIA_TYPE_VIDEO
      type: string
      description: "FileMediaType describes the media category of a knowledge base file.\n\n - FILE_MEDIA_TYPE_DOCUMENT: Document.\n - FILE_MEDIA_TYPE_IMAGE: Image.\n - FILE_MEDIA_TYPE_AUDIO: Audio.\n - FILE_MEDIA_TYPE_VIDEO: Video."
    FileProcessStatus:
      title: file embedding process status
      enum:
        - FILE_PROCESS_STATUS_NOTSTARTED
        - FILE_PROCESS_STATUS_PROCESSING
        - FILE_PROCESS_STATUS_CHUNKING
        - FILE_PROCESS_STATUS_EMBEDDING
        - FILE_PROCESS_STATUS_COMPLETED
        - FILE_PROCESS_STATUS_FAILED
      type: string
      description: "- FILE_PROCESS_STATUS_NOTSTARTED: NOTSTARTED\n - FILE_PROCESS_STATUS_PROCESSING: file is being processed (parallel architecture: conversion + summarization)\n - FILE_PROCESS_STATUS_CHUNKING: file is chunking\n - FILE_PROCESS_STATUS_EMBEDDING: file is embedding\n - FILE_PROCESS_STATUS_COMPLETED: completed\n - FILE_PROCESS_STATUS_FAILED: failed"
