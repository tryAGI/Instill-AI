openapi: '3.2.0'
info:
  title: Instill Core API
  description: Interact with Instill Core through API
  contact:
    name: Instill AI
    url: https://github.com/instill-ai
    email: support@instill-ai.com
  license:
    name: MIT
    url: https://github.com/instill-ai/protobufs/blob/main/LICENSE
  version: v0.57.0
servers:
  - url: https://api.instill-ai.com
  - url: http://api.instill-ai.com
paths:
  '/v1alpha/{parent}/knowledge-bases':
    get:
      tags:
        - Artifact
      summary: Get all knowledge bases info
      description: Returns a paginated list of knowledge bases.
      operationId: ArtifactPublicService_ListKnowledgeBases
      parameters:
        - name: parent
          in: path
          description: "The parent resource name.\nFormat: `namespaces/{namespace}`"
          required: true
          schema:
            pattern: 'namespaces/[^/]+'
            type: string
        - name: pageSize
          in: query
          description: "The maximum number of knowledge bases to return. If this parameter is\nunspecified, at most 10 knowledge bases will be returned. The cap value for\nthis parameter is 100 (i.e. any value above that will be coerced to 100)."
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Page token for pagination.
          schema:
            type: string
        - name: filter
          in: query
          description: "Filter can hold an [AIP-160](https://google.aip.dev/160)-compliant filter\nexpression.\n- `id=\"<knowledge_base_id>\"` or `uid=\"<uuid>\"` - Filter by specific\nknowledge base ID/UID\n- `q=\"<text>\"` - Fuzzy search on knowledge base ID and description\n\n**Examples**:\n- Filter by ID: `id=\"my-knowledge-base\"`\n- Search knowledge bases: `q=\"my-knowledge-base\"`"
          schema:
            type: string
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListKnowledgeBasesResponse'
        '401':
          description: Returned when the client credentials are not valid.
          content:
            application/json:
              schema: { }
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rpc.Status'
      x-stage: alpha
    post:
      tags:
        - Artifact
      summary: Create a knowledge base
      description: Creates a knowledge base.
      operationId: ArtifactPublicService_CreateKnowledgeBase
      parameters:
        - name: parent
          in: path
          description: "The parent resource name.\nFormat: `namespaces/{namespace}`"
          required: true
          schema:
            pattern: 'namespaces/[^/]+'
            type: string
      requestBody:
        description: "The knowledge base resource to create.\nRequired fields: display_name\nOptional fields: id (auto-generated from display_name if not provided),\n                 description, tags, type, system_id"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeBase'
        required: true
        x-bodyName: knowledgeBase
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateKnowledgeBaseResponse'
        '401':
          description: Returned when the client credentials are not valid.
          content:
            application/json:
              schema: { }
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rpc.Status'
      x-stage: alpha
  '/v1alpha/{name}':
    get:
      tags:
        - Artifact
      summary: Get a knowledge base
      description: Returns the details of a knowledge base.
      operationId: ArtifactPublicService_GetKnowledgeBase
      parameters:
        - name: name
          in: path
          description: "The resource name of the knowledge base to retrieve.\nFormat: `namespaces/{namespace}/knowledge-bases/{knowledge_base}`"
          required: true
          schema:
            pattern: 'namespaces/[^/]+/knowledge-bases/[^/]+'
            type: string
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetKnowledgeBaseResponse'
        '401':
          description: Returned when the client credentials are not valid.
          content:
            application/json:
              schema: { }
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rpc.Status'
      x-stage: alpha
    delete:
      tags:
        - Artifact
      summary: Delete a knowledge base
      description: Deletes a knowledge base.
      operationId: ArtifactPublicService_DeleteKnowledgeBase
      parameters:
        - name: name
          in: path
          description: "The resource name of the knowledge base to delete.\nFormat: `namespaces/{namespace}/knowledge-bases/{knowledge_base}`"
          required: true
          schema:
            pattern: 'namespaces/[^/]+/knowledge-bases/[^/]+'
            type: string
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteKnowledgeBaseResponse'
        '401':
          description: Returned when the client credentials are not valid.
          content:
            application/json:
              schema: { }
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rpc.Status'
      x-stage: alpha
    patch:
      tags:
        - Artifact
      summary: Update a chunk
      description: Updates a chunk.
      operationId: ArtifactPublicService_UpdateChunk
      parameters:
        - name: name
          in: path
          description: "The resource name of the chunk to update.\nFormat:\n`namespaces/{namespace}/knowledge-bases/{knowledge_base}/files/{file}/chunks/{chunk}`"
          required: true
          schema:
            pattern: 'namespaces/[^/]+/knowledge-bases/[^/]+/files/[^/]+/chunks/[^/]+'
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChunkBody'
        required: true
        x-bodyName: body
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateChunkResponse'
        '401':
          description: Returned when the client credentials are not valid.
          content:
            application/json:
              schema: { }
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rpc.Status'
      x-stage: alpha
  '/v1alpha/{knowledgeBase.name}':
    patch:
      tags:
        - Artifact
      summary: Update a knowledge base info
      description: Updates the information of a knowledge base.
      operationId: ArtifactPublicService_UpdateKnowledgeBase
      parameters:
        - name: knowledgeBase.name
          in: path
          description: "Field 1: Canonical resource name.\nFormat: `namespaces/{namespace}/knowledge-bases/{knowledge_base}`."
          required: true
          schema:
            pattern: 'namespaces/[^/]+/knowledge-bases/[^/]+'
            type: string
      requestBody:
        description: "The knowledge base resource to update. The knowledge base's `name` field\nidentifies the resource.\nFormat: `namespaces/{namespace}/knowledge-bases/{knowledge_base}`"
        content:
          application/json:
            schema:
              title: "The knowledge base resource to update. The knowledge base's `name` field\nidentifies the resource.\nFormat: `namespaces/{namespace}/knowledge-bases/{knowledge_base}`"
              required:
                - displayName
              type: object
              properties:
                id:
                  title: "Field 2: Immutable canonical resource ID (80-96 bits entropy, base62).\nExample: \"kb-8f3a2k9E7c1\""
                  type: string
                  readOnly: true
                displayName:
                  type: string
                  description: 'Field 3: Human-readable display name for UI.'
                slug:
                  title: "Field 4: URL-friendly slug (NO prefix).\nIf omitted, server generates from display_name.\nIf provided, server validates and persists it.\nSlug is NOT part of resource identity.\nExample: \"my-knowledge-base\""
                  type: string
                aliases:
                  type: array
                  items:
                    type: string
                  description: "Field 5: Previous slugs for backward compatibility.\nWhen display_name changes, a new slug is generated and old slugs are stored\nhere."
                  readOnly: true
                description:
                  type: string
                  description: 'Field 6: Optional description.'
                createTime:
                  type: string
                  description: 'Field 7: Creation time.'
                  format: date-time
                  readOnly: true
                updateTime:
                  type: string
                  description: 'Field 8: Last update time.'
                  format: date-time
                  readOnly: true
                tags:
                  type: array
                  items:
                    type: string
                  description: The knowledge base tags.
                type:
                  allOf:
                    - $ref: '#/components/schemas/KnowledgeBaseType'
                  description: "The knowledge base type (persistent or ephemeral).\nDefault is PERSISTENT if not specified during creation."
                system:
                  title: "System ID defines how the knowledge base will be created based on the\nsystem's RAG configurations including:\n- AI model family (e.g., \"openai\", \"gemini\")\n- Embedding vector dimensionality\n- Chunking method\n- Other RAG-related settings"
                  type: string
                  description: "The resource name of the system configuration.\nFormat: `systems/{system}`\nAvailable systems: \"systems/openai\", \"systems/gemini\", or custom systems.\nIf not specified, defaults to the default system."
                embeddingConfig:
                  allOf:
                    - $ref: '#/components/schemas/EmbeddingConfig'
                  description: The embedding configuration for the knowledge base.
                activeCollection:
                  type: string
                  description: "The resource name of the active Milvus collection for this knowledge base.\nFormat:\n`namespaces/{namespace}/knowledge-bases/{knowledge_base}/collections/{collection}`\nThis supports collection versioning for embedding dimension changes."
                  readOnly: true
                ownerName:
                  title: "Resource name of the owner namespace.\nExample: \"namespaces/usr-7k2m9p4w1n3\" or \"namespaces/org-3t8f5q2x6b1\""
                  type: string
                  readOnly: true
                owner:
                  allOf:
                    - $ref: '#/components/schemas/Owner'
                  description: Knowledge base owner (User or Organization).
                  readOnly: true
                creatorName:
                  type: string
                  description: "Full resource name of the user who created this knowledge base.\nFormat: `users/{user}`\nOptional for system-created knowledge bases (e.g., instill-agent)."
                  readOnly: true
                creator:
                  allOf:
                    - $ref: '#/components/schemas/v1beta.User'
                  description: "The user who created this knowledge base.\nPopulated when creator_name is present."
                  readOnly: true
                totalFiles:
                  type: integer
                  description: The total files in knowledge base.
                  format: int64
                  readOnly: true
                totalTokens:
                  type: integer
                  description: The total tokens in knowledge base.
                  format: int64
                  readOnly: true
                usedStorage:
                  type: string
                  description: The current used storage in knowledge base.
                  format: uint64
                  readOnly: true
                downstreamApps:
                  type: array
                  items:
                    type: string
                  description: The downstream apps.
                  readOnly: true
        required: true
        x-bodyName: knowledgeBase
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateKnowledgeBaseResponse'
        '401':
          description: Returned when the client credentials are not valid.
          content:
            application/json:
              schema: { }
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rpc.Status'
      x-stage: alpha
  '/v1alpha/{parent}/files':
    get:
      tags:
        - Artifact
      summary: List files
      description: Returns a paginated list of files.
      operationId: ArtifactPublicService_ListFiles
      parameters:
        - name: parent
          in: path
          description: "The parent resource name (knowledge base).\nFormat: `namespaces/{namespace}/knowledge-bases/{knowledge_base}`"
          required: true
          schema:
            pattern: 'namespaces/[^/]+/knowledge-bases/[^/]+'
            type: string
        - name: pageSize
          in: query
          description: The page size (default:10; max 100).
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: The next page token(default from first file's token).
          schema:
            type: string
        - name: filter
          in: query
          description: "Filter can hold an [AIP-160](https://google.aip.dev/160)-compliant filter\nexpression.\n- `id=\"<uuid>\"` or `uid=\"<uuid>\"` - Filter by specific file ID/UID\n(supports multiple IDs separated by OR)\n- `process_status=\"FILE_PROCESS_STATUS_COMPLETED\"` - Filter by processing\nstatus\n\n**Examples**:\n- List specific files: `id=\"uuid1\" OR id=\"uuid2\"`\n- List completed files: `process_status=\"FILE_PROCESS_STATUS_COMPLETED\"`"
          schema:
            type: string
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFilesResponse'
        '401':
          description: Returned when the client credentials are not valid.
          content:
            application/json:
              schema: { }
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rpc.Status'
      x-stage: alpha
    post:
      tags:
        - Artifact
      summary: Create a file
      description: Uploads and converts a file.
      operationId: ArtifactPublicService_CreateFile
      parameters:
        - name: parent
          in: path
          description: "The parent resource name (knowledge base).\nFormat: `namespaces/{namespace}/knowledge-bases/{knowledge_base}`"
          required: true
          schema:
            pattern: 'namespaces/[^/]+/knowledge-bases/[^/]+'
            type: string
      requestBody:
        description: The file to create.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/File'
        required: true
        x-bodyName: file
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFileResponse'
        '401':
          description: Returned when the client credentials are not valid.
          content:
            application/json:
              schema: { }
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rpc.Status'
      x-stage: alpha
  '/v1alpha/{name_1}':
    get:
      tags:
        - Artifact
      summary: Get a file
      description: Returns the details of a file.
      operationId: ArtifactPublicService_GetFile
      parameters:
        - name: name_1
          in: path
          description: "The resource name of the file to retrieve.\nFormat:\n`namespaces/{namespace}/knowledge-bases/{knowledge_base}/files/{file}`"
          required: true
          schema:
            pattern: 'namespaces/[^/]+/knowledge-bases/[^/]+/files/[^/]+'
            type: string
        - name: view
          in: query
          description: "View allows clients to specify the desired file view in the response.\n\n - VIEW_BASIC: Default view, only includes basic metadata.\n - VIEW_FULL: Full representation with all metadata.\n - VIEW_SUMMARY: Returns MinIO pre-signed URL to converted summary content.\n - VIEW_CONTENT: Returns MinIO pre-signed URL to converted markdown content.\n - VIEW_STANDARD_FILE_TYPE: Returns MinIO pre-signed URL to standardized file:\n- Documents → PDF\n- Images → PNG\n- Audio → OGG\n- Video → MP4\n - VIEW_ORIGINAL_FILE_TYPE: Returns MinIO pre-signed URL to the original uploaded file.\n - VIEW_CACHE: Returns Gemini cache resource name."
          schema:
            enum:
              - VIEW_BASIC
              - VIEW_FULL
              - VIEW_SUMMARY
              - VIEW_CONTENT
              - VIEW_STANDARD_FILE_TYPE
              - VIEW_ORIGINAL_FILE_TYPE
              - VIEW_CACHE
            type: string
        - name: storageProvider
          in: query
          description: "Storage provider specifies which storage backend to use for the file\nresource. This field is only applicable for views that return file content:\nVIEW_SUMMARY, VIEW_CONTENT, VIEW_STANDARD_FILE_TYPE,\nVIEW_ORIGINAL_FILE_TYPE.\n- STORAGE_PROVIDER_UNSPECIFIED or STORAGE_PROVIDER_MINIO: Returns MinIO\npre-signed URL (default)\n- STORAGE_PROVIDER_GCS: Uploads file to GCS if not present (with cache\ncheck), returns GCS signed URL GCS requires proper configuration in system\nsettings.\n\n - STORAGE_PROVIDER_MINIO: Use MinIO as the storage backend (default)\n - STORAGE_PROVIDER_GCS: Use Google Cloud Storage as the storage backend"
          schema:
            enum:
              - STORAGE_PROVIDER_MINIO
              - STORAGE_PROVIDER_GCS
            type: string
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFileResponse'
        '401':
          description: Returned when the client credentials are not valid.
          content:
            application/json:
              schema: { }
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rpc.Status'
      x-stage: alpha
    delete:
      tags:
        - Artifact
      summary: Delete a file
      description: Deletes a file.
      operationId: ArtifactPublicService_DeleteFile
      parameters:
        - name: name_1
          in: path
          description: "The resource name of the file to delete.\nFormat:\n`namespaces/{namespace}/knowledge-bases/{knowledge_base}/files/{file}`"
          required: true
          schema:
            pattern: 'namespaces/[^/]+/knowledge-bases/[^/]+/files/[^/]+'
            type: string
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteFileResponse'
        '401':
          description: Returned when the client credentials are not valid.
          content:
            application/json:
              schema: { }
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rpc.Status'
      x-stage: alpha
  '/v1alpha/{file.name}':
    patch:
      tags:
        - Artifact
      summary: Update a file
      description: Updates a file.
      operationId: ArtifactPublicService_UpdateFile
      parameters:
        - name: file.name
          in: path
          description: "Field 1: Canonical resource name.\nFormat:\n`namespaces/{namespace}/knowledge-bases/{knowledge_base}/files/{file}`."
          required: true
          schema:
            pattern: 'namespaces/[^/]+/knowledge-bases/[^/]+/files/[^/]+'
            type: string
      requestBody:
        description: "The file resource to update. The file's `name` field identifies the\nresource. Format:\n`namespaces/{namespace}/knowledge-bases/{knowledge_base}/files/{file}`"
        content:
          application/json:
            schema:
              title: "The file resource to update. The file's `name` field identifies the\nresource. Format:\n`namespaces/{namespace}/knowledge-bases/{knowledge_base}/files/{file}`"
              required:
                - displayName
              type: object
              properties:
                id:
                  title: "Field 2: Immutable canonical resource ID (80-96 bits entropy, base62).\nExample: \"file-8f3a2k9E7c1\""
                  type: string
                  readOnly: true
                displayName:
                  type: string
                  description: "Field 3: Human-readable display name (filename) for UI.\nThis is typically the original filename of the uploaded file."
                slug:
                  title: "Field 4: URL-friendly slug (NO prefix).\nIf omitted, server generates from display_name.\nIf provided, server validates and persists it.\nSlug is NOT part of resource identity.\nExample: \"my-research-file-pdf\""
                  type: string
                aliases:
                  type: array
                  items:
                    type: string
                  description: "Field 5: Previous slugs for backward compatibility.\nWhen display_name changes, a new slug is generated and old slugs are stored\nhere."
                  readOnly: true
                description:
                  type: string
                  description: 'Field 6: Optional description.'
                createTime:
                  type: string
                  description: 'Field 7: Creation time.'
                  format: date-time
                  readOnly: true
                updateTime:
                  type: string
                  description: 'Field 8: Last update time.'
                  format: date-time
                  readOnly: true
                type:
                  allOf:
                    - $ref: '#/components/schemas/File.Type'
                  description: File type.
                processStatus:
                  allOf:
                    - $ref: '#/components/schemas/FileProcessStatus'
                  description: File process status.
                  readOnly: true
                processOutcome:
                  type: string
                  description: File process outcome message.
                  readOnly: true
                size:
                  type: string
                  description: File size in bytes.
                  format: int64
                  readOnly: true
                totalChunks:
                  type: integer
                  description: Total number of chunks created from this file.
                  format: int32
                  readOnly: true
                totalTokens:
                  type: integer
                  description: Total number of tokens in this file.
                  format: int32
                  readOnly: true
                tags:
                  type: array
                  items:
                    type: string
                  description: Array of tags associated with the file.
                externalMetadata:
                  type: object
                  description: Custom metadata provided by the user during file upload.
                knowledgeBases:
                  type: array
                  items:
                    type: string
                  description: "Knowledge base resource names that this file is associated with.\nFormat: `namespaces/{namespace}/knowledge-bases/{knowledge_base}`\nA file can belong to multiple knowledge bases within the same namespace.\nThis field is populated from the file_knowledge_base junction table.\nFollows AIP-122 for resource name references."
                  readOnly: true
                ownerName:
                  title: "Resource name of the owner namespace.\nExample: \"namespaces/usr-7k2m9p4w1n3\" or \"namespaces/org-3t8f5q2x6b1\""
                  type: string
                  readOnly: true
                owner:
                  allOf:
                    - $ref: '#/components/schemas/Owner'
                  description: File owner (User or Organization).
                  readOnly: true
                creatorName:
                  title: "Full resource name of the user who created this file.\nFormat: `users/{user}`"
                  type: string
                  readOnly: true
                creator:
                  allOf:
                    - $ref: '#/components/schemas/v1beta.User'
                  description: "The user who created this file.\nPopulated when creator_name is present."
                  readOnly: true
                content:
                  type: string
                  description: "Base64-encoded file content for inline upload.\nAlternative to object field for smaller files."
                downloadUrl:
                  type: string
                  description: Pre-signed download URL for the file.
                  readOnly: true
                convertingPipeline:
                  type: string
                  description: "Pipeline used for converting the file to Markdown if the file is a\ndocument (i.e., a file with pdf, doc[x] or ppt[x] extension)."
                length:
                  allOf:
                    - $ref: '#/components/schemas/Position'
                  description: Length of the file in the specified unit type.
                  readOnly: true
                collections:
                  type: array
                  items:
                    type: string
                  description: "Collection resource names that this file belongs to.\nFormat: `namespaces/{namespace}/collections/{collection}`\nThis field is system-managed and populated from collection membership.\nFollows AIP-122 for resource name references."
                  readOnly: true
                deleteTime:
                  type: string
                  description: Soft delete timestamp.
                  format: date-time
                  readOnly: true
                object:
                  type: string
                  description: "Object resource name reference for blob storage upload.\nFormat: `namespaces/{namespace}/objects/{object}`\nTwo upload approaches are supported:\n1. Direct upload: Upload file directly to MinIO via GetObjectUploadURL,\n   then provide the object resource name here.\n   This avoids base64 encoding overhead and is preferred for large files.\n2. Inline content: Provide base64-encoded file content in the 'content'\n   field. When object is provided, the 'content' field is ignored.\nFollows AIP-122 for resource name references."
        required: true
        x-bodyName: file
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateFileResponse'
        '401':
          description: Returned when the client credentials are not valid.
          content:
            application/json:
              schema: { }
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rpc.Status'
      x-stage: alpha
  '/v1alpha/{name}/reprocess':
    post:
      tags:
        - Artifact
      summary: Reprocess a file
      description: "Triggers reprocessing of a file with its current configuration.\nThis will regenerate embeddings, chunks, and summaries."
      operationId: ArtifactPublicService_ReprocessFile
      parameters:
        - name: name
          in: path
          description: "The resource name of the file to reprocess.\nFormat:\n`namespaces/{namespace}/knowledge-bases/{knowledge_base}/files/{file}`"
          required: true
          schema:
            pattern: 'namespaces/[^/]+/knowledge-bases/[^/]+/files/[^/]+'
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReprocessFileBody'
        required: true
        x-bodyName: body
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReprocessFileResponse'
        '401':
          description: Returned when the client credentials are not valid.
          content:
            application/json:
              schema: { }
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rpc.Status'
      x-stage: alpha
  '/v1alpha/{name_2}':
    get:
      tags:
        - Artifact
      summary: Get a chunk
      description: Returns the details of a chunk.
      operationId: ArtifactPublicService_GetChunk
      parameters:
        - name: name_2
          in: path
          description: "The resource name of the chunk to retrieve.\nFormat:\n`namespaces/{namespace}/knowledge-bases/{knowledge_base}/files/{file}/chunks/{chunk}`"
          required: true
          schema:
